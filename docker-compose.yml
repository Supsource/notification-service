version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: notification-postgres
    environment:
      POSTGRES_USER: notif_user
      POSTGRES_PASSWORD: notif_pass
      POSTGRES_DB: notification_db
    ports:
    - "5433:5432"
    volumes:
    - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
      